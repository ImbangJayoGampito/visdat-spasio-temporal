<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Page Title</title>
        <!-- Link to external CSS files if needed -->
        <link rel="stylesheet" href="styles.css" />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""
        />
    </head>

    <body>
        <script
            src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""
        ></script>
        <h1>Hasil Tugas 1</h1>
        <p>Barebones</p>
        <div
            id="map"
            style="height: 400px; width: 100%"
            class="rounded-lg border border-gray-300 z-0"
        ></div>

        <script>
            let map = L.map("map").setView([-0.9149096, 100.4584898], 17);
            L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
                maxZoom: 19,
                attribution:
                    '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            }).addTo(map);
            // Buat Marker
            let marker = L.marker([-0.9149096, 100.4584898]).addTo(map);
            // Buat Custom Marker
            let customMarker = L.marker([-0.9149096, 100.4582], {
                icon: L.icon({
                    iconUrl:
                        "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-icon.png",
                    iconSize: [32, 48],
                    iconAnchor: [16, 16],
                    popupAnchor: [0, -16],
                }),
            }).addTo(map);
            customMarker.bindPopup("Ini adalah custom marker"); // Opsional, tambahkan popup jika perlu
            let popup = L.popup()
                .setLatLng([-0.9149096, 100.4582])
                .setContent("Ini adalah popup")
                .openOn(map);

            // Contoh Polyline
            var polyline = L.polyline(
                [
                    [-0.9149096, 100.4584898],
                    [-0.9155, 100.4592],
                    [-0.9162, 100.4588],
                    [-0.9158, 100.458],
                ],
                { color: "red", weight: 5 },
            ).addTo(map);
            polyline.bindPopup("Ini adalah polyline");

            // Contoh Polygon
            var polygon = L.polygon(
                [
                    [-0.9135, 100.4575],
                    [-0.9135, 100.4595],
                    [-0.9155, 100.4595],
                    [-0.9155, 100.4575],
                ],
                { color: "blue", fillOpacity: 0.3 },
            ).addTo(map);
            polygon.bindPopup("Ini adalah polygon");

            // Contoh Circle
            var circle = L.circle([-0.9165, 100.4595], {
                color: "green",
                fillColor: "#4caf50",
                fillOpacity: 0.3,
                radius: 150,
            }).addTo(map);
            circle.bindPopup("Ini adalah circle");
        </script>
    </body>
</html>
